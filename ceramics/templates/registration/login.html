{% extends "ceramics/base.html" %}
{% block title %}Sign In{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-16">
  <div class="bg-white rounded-2xl shadow-md p-8">
    <div class="text-center mb-8">
      <svg class="w-12 h-12 mx-auto text-kiln mb-3" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M12 3C7.03 3 3 6.13 3 10c0 2.21 1.3 4.17 3.3 5.47V19a1 1 0 001 1h9a1 1 0 001-1v-3.53C19.7 14.17 21 12.21 21 10c0-3.87-4.03-7-9-7z"/>
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 21v-4m3 4v-4m3 4v-4"/>
      </svg>
      <h1 class="text-2xl font-bold text-clay-dark">Ceramics Portfolio</h1>
      <p class="text-stone-500 mt-1 text-sm">Sign in to manage your collections</p>
    </div>

    <form method="post">
      {% csrf_token %}
      {% if form.errors %}
        <div class="mb-4 p-3 bg-red-50 text-red-700 rounded-lg text-sm">
          Invalid username or password.
        </div>
      {% endif %}

      <div class="mb-4">
        <label class="block text-sm font-medium text-stone-700 mb-1">Username</label>
        <input type="text" name="username" autofocus required
          class="w-full rounded-lg border border-stone-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-amber-500" />
      </div>
      <div class="mb-6">
        <label class="block text-sm font-medium text-stone-700 mb-1">Password</label>
        <input type="password" name="password" required
          class="w-full rounded-lg border border-stone-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-amber-500" />
      </div>

      <input type="hidden" name="next" value="{{ next }}" />
      <button type="submit"
        class="w-full bg-kiln hover:bg-kiln-dark text-white font-semibold py-2.5 rounded-lg transition">
        Sign In
      </button>
    </form>
  </div>
</div>
{% endblock %}
