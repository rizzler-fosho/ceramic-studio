{% extends "ceramics/base.html" %}
{% block title %}Confirm Delete{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-16">
  <div class="bg-white rounded-2xl shadow-sm border border-red-100 p-8 text-center">
    <svg class="w-12 h-12 text-red-400 mx-auto mb-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/>
    </svg>
    <h1 class="text-xl font-bold text-stone-800 mb-2">Are you sure?</h1>
    <p class="text-stone-500 mb-6">
      This will permanently delete <strong class="text-stone-700">{{ object }}</strong>
      and all associated data. This cannot be undone.
    </p>
    <form method="post">
      {% csrf_token %}
      <div class="flex gap-3">
        <button type="submit"
          class="flex-1 bg-red-500 hover:bg-red-600 text-white font-semibold py-2.5 rounded-xl transition">
          Yes, delete it
        </button>
        <a href="javascript:history.back()"
          class="flex-1 text-center bg-stone-100 hover:bg-stone-200 text-stone-600 font-semibold py-2.5 rounded-xl transition">
          Cancel
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
